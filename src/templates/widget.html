<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theme Studio</title>
<style>
  :root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f0883e;--green:#3fb950;--red:#f85149;--radius:6px}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;height:100%;overflow:hidden;}
  .wrap{display:flex;flex-direction:column;height:100vh;padding:6px;}
  .toolbar{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-bottom:6px;}
  .toolbar-title{font-weight:600;font-size:13px;flex:1;}
  .btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);cursor:pointer;font-size:11px;padding:4px 10px;font-family:inherit;white-space:nowrap;}
  .btn:hover{background:var(--surface);border-color:var(--muted);}
  .btn-accent{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600;}
  .list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
  .theme-row{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;}
  .theme-row:hover{border-color:var(--muted);}
  .swatches{display:flex;gap:2px;flex-shrink:0;}
  .swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;}
  .theme-name{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .copy-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;font-size:10px;padding:2px 7px;flex-shrink:0;}
  .copy-btn:hover{color:var(--accent);border-color:var(--accent);}
  .copy-btn.copied{color:var(--green);border-color:var(--green);}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <span class="toolbar-title">🎨 Theme Studio</span>
    <button class="btn btn-accent" onclick="openStudio()">Open Studio</button>
  </div>
  <div class="list">
    {% for t in themes %}
    <div class="theme-row">
      <div class="swatches">
        <div class="swatch" style="background:{{t.vars['--bg']}}" title="Background"></div>
        <div class="swatch" style="background:{{t.vars['--surface']}}" title="Surface"></div>
        <div class="swatch" style="background:{{t.vars['--text']}}" title="Text"></div>
        <div class="swatch" style="background:{{t.vars['--accent']}}" title="Accent"></div>
        <div class="swatch" style="background:{{t.vars['--border']}}" title="Border"></div>
      </div>
      <span class="theme-name">{{t.name}}</span>
      <button class="copy-btn" onclick="copyUrl('{{t.id}}',this)">Copy URL</button>
    </div>
    {% endfor %}
  </div>
</div>
<script>
  const BASE = window.location.origin;

  function copyUrl(id, btn) {
    const url = `${BASE}/widget/themes/${id}.njtheme.json`;
    const showDone = () => {
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy URL'; btn.classList.remove('copied'); }, 2000);
    };
    // In iframe: route via parent postMessage (sandbox blocks direct clipboard)
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'wcp:copy-to-clipboard', text: url }, '*');
      showDone();
      return;
    }
    // Standalone: try clipboard API then fallback
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(showDone).catch(() => { fallbackCopy(url); showDone(); });
    } else { fallbackCopy(url); showDone(); }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(_) {}
    document.body.removeChild(ta);
  }

  function openStudio() {
    window.parent.postMessage({
      type: 'wcp:open-window',
      url: `${BASE}/widget/full`,
      window: { width: 1100, height: 700 }
    }, '*');
  }
</script>
</body>
</html>
