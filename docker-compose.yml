services:
  theme-studio:
    build: .
    image: wcp-widget-theme-studio
    container_name: wcp-widget-theme-studio
    ports:
      - "3740:3740"
    environment:
      - CONTAINER_NAME=wcp-widget-theme-studio
    restart: unless-stopped
    volumes:
      - theme_data:/app/data
      - ./published:/app/published

volumes:
  theme_data:
